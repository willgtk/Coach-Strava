services:
  coach_bot:
    build: .
    container_name: mtb_coach_bot
    restart: unless-stopped
    environment:
      # Ajusta o fuso horário para o agendador bater certinho com 18h
      - TZ=America/Sao_Paulo
    env_file:
      - .env
    volumes:
      # Volume nomeado para persistência segura do banco
      - coach_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import os,time; assert time.time()-float(open('/tmp/bot_health').read())<120"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  coach_data: