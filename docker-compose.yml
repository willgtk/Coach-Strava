services:
  coach_bot:
    build: .
    container_name: mtb_coach_bot
    restart: unless-stopped
    environment:
      # Ajusta o fuso horário para o agendador bater certinho com 18h
      - TZ=America/Sao_Paulo
    env_file:
      - .env
    volumes:
      # Mapeia o banco de dados de memória para persistência
      - ./coach_database.db:/app/coach_database.db
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('https://api.telegram.org', timeout=5)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s